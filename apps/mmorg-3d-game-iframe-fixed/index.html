<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Mini MMORPG (iframe-safe)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      background: #000; 
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      color: white;
    }
    #ui-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      pointer-events: none;
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.7);
      transition: opacity 0.3s;
    }
    #ui-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    h1 { font-size: 2.2rem; margin-bottom: 1rem; color: #4ade80; text-shadow: 0 0 10px rgba(74, 222, 128, 0.5); }
    p { font-size: 1.1rem; max-width: 600px; line-height: 1.6; margin-bottom: 1.5rem; }
    .controls { 
      background: rgba(0,0,0,0.6); 
      padding: 1rem 1.5rem; 
      border-radius: 8px; 
      margin-top: 1rem;
      font-family: monospace;
      font-size: 0.95rem;
    }
    button {
      background: #4ade80;
      color: #000;
      border: none;
      padding: 0.75rem 2rem;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 1rem;
      pointer-events: auto;
      transition: all 0.2s;
    }
    button:hover { background: #22c55e; transform: scale(1.05); }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="ui-overlay">
    <h1>3D Mini MMORPG</h1>
    <p>Explore a voxel world in your browser. Click anywhere to lock mouse and move.</p>
    <div class="controls">
      <strong>WASD</strong> — Move &nbsp;&nbsp;|&nbsp;&nbsp; <strong>Mouse</strong> — Look &nbsp;&nbsp;|&nbsp;&nbsp; <strong>SPACE</strong> — Jump
    </div>
    <button id="start-btn">▶ Click to Play</button>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
    import { PointerLockControls } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/controls/PointerLockControls.js';

    // --- Scene setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- Lights ---
    const ambientLight = new THREE.AmbientLight(0x404040, 2);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(10, 20, 15);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.width = 1024;
    directionalLight.shadow.mapSize.height = 1024;
    scene.add(directionalLight);

    // --- Ground ---
    const groundGeometry = new THREE.PlaneGeometry(100, 100);
    const groundMaterial = new THREE.MeshStandardMaterial({ 
      color: 0x228B22, 
      roughness: 0.8,
      metalness: 0.2
    });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // --- Player (simple cube) ---
    const playerGeometry = new THREE.BoxGeometry(1, 2, 1);
    const playerMaterial = new THREE.MeshStandardMaterial({ color: 0x3b82f6 });
    const player = new THREE.Mesh(playerGeometry, playerMaterial);
    player.castShadow = true;
    scene.add(player);

    // --- Controls ---
    const controls = new PointerLockControls(camera, document.body);
    const blocker = document.getElementById('ui-overlay');
    const instructions = document.getElementById('start-btn');

    let moveForward = false;
    let moveBackward = false;
    let moveLeft = false;
    let moveRight = false;
    let canJump = true;

    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();

    // --- Event listeners ---
    instructions.addEventListener('click', function () {
      controls.lock();
      blocker.classList.add('hidden');
    });

    controls.addEventListener('lock', function () {
      instructions.textContent = 'Locked — WASD + Mouse';
      instructions.style.background = '#10b981';
    });

    controls.addEventListener('unlock', function () {
      blocker.classList.remove('hidden');
      instructions.textContent = '▶ Click to Play';
      instructions.style.background = '#4ade80';
    });

    document.addEventListener('keydown', function (event) {
      switch (event.code) {
        case 'ArrowUp':
        case 'KeyW': moveForward = true; break;
        case 'ArrowLeft':
        case 'KeyA': moveLeft = true; break;
        case 'ArrowDown':
        case 'KeyS': moveBackward = true; break;
        case 'ArrowRight':
        case 'KeyD': moveRight = true; break;
        case 'Space':
          if (canJump) {
            velocity.y = 10;
            canJump = false;
          }
          break;
      }
    });

    document.addEventListener('keyup', function (event) {
      switch (event.code) {
        case 'ArrowUp':
        case 'KeyW': moveForward = false; break;
        case 'ArrowLeft':
        case 'KeyA': moveLeft = false; break;
        case 'ArrowDown':
        case 'KeyS': moveBackward = false; break;
        case 'ArrowRight':
        case 'KeyD': moveRight = false; break;
      }
    });

    // --- Animation loop ---
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.1);

      if (controls.isLocked === true) {
        velocity.x -= velocity.x * 10.0 * delta;
        velocity.z -= velocity.z * 10.0 * delta;
        velocity.y -= 9.8 * delta; // gravity

        direction.z = Number(moveForward) - Number(moveBackward);
        direction.x = Number(moveRight) - Number(moveLeft);
        direction.normalize();

        if (moveForward || moveBackward || moveLeft || moveRight) {
          velocity.x += direction.x * 20.0 * delta;
          velocity.z += direction.z * 20.0 * delta;
        }

        controls.moveRight(-velocity.x * delta);
        controls.moveForward(-velocity.z * delta);
        player.position.copy(controls.getObject().position);
        player.position.y = Math.max(player.position.y, 1); // ground level

        if (player.position.y <= 1) {
          velocity.y = 0;
          player.position.y = 1;
          canJump = true;
        }
      }

      renderer.render(scene, camera);
    }

    // --- Resize handler ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Start animation ---
    animate();
  </script>
</body>
</html>

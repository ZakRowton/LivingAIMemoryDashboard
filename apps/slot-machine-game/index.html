<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Full‑Screen Slot Machine</title>
<style>
html, body {
  margin: 0; padding: 0; height: 100%; background: #0a0a0a; color: #fff;
  font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
#app {
  width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
}
#reels {
  display: flex; gap: 20px; margin-bottom: 30px;
}
.reel {
  width: 150px; height: 150px; background: #222; border-radius: 12px; display: flex; align-items: center; justify-content: center;
  font-size: 80px; color: #fff; transition: transform 0.2s;
}
#spin {
  background: #ffcc00; color: #000; border: none; border-radius: 8px; padding: 15px 40px; font-size: 24px; cursor: pointer;
  box-shadow: 0 4px #b38f00; transition: all 0.1s;
}
#spin:active { transform: translateY(4px); box-shadow: none; }
#balance, #msg { margin-top: 15px; font-size: 20px; }
</style>
</head>
<body>
<div id="app">
  <div id="reels">
    <div class="reel" id="r1">🍒</div>
    <div class="reel" id="r2">🍒</div>
    <div class="reel" id="r3">🍒</div>
  </div>
  <button id="spin">Spin ($10)</button>
  <div id="balance">Balance: $<span id="bal">100</span></div>
  <div id="msg"></div>
</div>
<script>
const symbols = ['🍒','🍋','⭐','💎','7️⃣'];
let balance = 100;
const balSpan = document.getElementById('bal');
const msgDiv = document.getElementById('msg');
const spinBtn = document.getElementById('spin');
const reels = [document.getElementById('r1'), document.getElementById('r2'), document.getElementById('r3')];

function randomSymbol() { return symbols[Math.floor(Math.random()*symbols.length)]; }

spinBtn.onclick = () => {
  if (balance < 10) {
    msgDiv.textContent = 'Insufficient funds.';
    return;
  }
  balance -= 10;
  balSpan.textContent = balance;
  // Show spinning placeholder
  reels.forEach(r => r.textContent = '❓');
  msgDiv.textContent = '';
  setTimeout(() => {
    const result = [randomSymbol(), randomSymbol(), randomSymbol()];
    reels.forEach((r,i) => r.textContent = result[i]);
    if (result[0]===result[1] && result[1]===result[2]) {
      const win = 100;
      balance += win;
      balSpan.textContent = balance;
      msgDiv.textContent = `Jackpot! ${result[0]}${result[1]}${result[2]} – $${win} awarded!`;
    } else {
      msgDiv.textContent = 'Try again!';
    }
  }, 800);
};
</script>
</body>
</html>

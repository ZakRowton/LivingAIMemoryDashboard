<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Mini MMORPG</title>
<style>
  body,html{margin:0;padding:0;overflow:hidden;height:100%;font-family:sans-serif;}
  #info{position:absolute;top:10px;left:10px;color:#fff;background:rgba(0,0,0,0.5);padding:5px 10px;border-radius:5px;}
</style>
</head>
<body>
<div id="info">Use <b>W A S D</b> to move, <b>Space</b> to jump.</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
<script>
let camera, scene, renderer, controls, clock;
let moveForward=false, moveBackward=false, moveLeft=false, moveRight=false, canJump=false;
let velocity = new THREE.Vector3();
let direction = new THREE.Vector3();
init();
animate();
function init(){
  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  document.body.appendChild(renderer.domElement);
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);
  camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
  camera.position.set(0,1.6,5);
  // Lights
  const hemi = new THREE.HemisphereLight(0xffffff,0x444444,1);
  hemi.position.set(0,20,0);
  scene.add(hemi);
  const dir = new THREE.DirectionalLight(0xffffff,0.8);
  dir.position.set(5,10,7);
  scene.add(dir);
  // Ground
  const groundGeo = new THREE.PlaneGeometry(200,200);
  const groundMat = new THREE.MeshStandardMaterial({color:0x228B22});
  const ground = new THREE.Mesh(groundGeo,groundMat);
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);
  // Pointer‑lock controls
  controls = new THREE.PointerLockControls(camera,document.body);
  document.body.addEventListener('click',()=>{controls.lock();});
  controls.addEventListener('lock',()=>{document.getElementById('info').style.display='none';});
  controls.addEventListener('unlock',()=>{document.getElementById('info').style.display='block';});
  // Keyboard input
  const onKeyDown = function(e){
    switch(e.code){
      case 'KeyW': case 'ArrowUp': moveForward=true; break;
      case 'KeyS': case 'ArrowDown': moveBackward=true; break;
      case 'KeyA': case 'ArrowLeft': moveLeft=true; break;
      case 'KeyD': case 'ArrowRight': moveRight=true; break;
      case 'Space': if(canJump){velocity.y+=5; canJump=false;} break;
    }
  };
  const onKeyUp = function(e){
    switch(e.code){
      case 'KeyW': case 'ArrowUp': moveForward=false; break;
      case 'KeyS': case 'ArrowDown': moveBackward=false; break;
      case 'KeyA': case 'ArrowLeft': moveLeft=false; break;
      case 'KeyD': case 'ArrowRight': moveRight=false; break;
    }
  };
  document.addEventListener('keydown',onKeyDown);
  document.addEventListener('keyup',onKeyUp);
  // Resize handling
  window.addEventListener('resize',()=>{
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
  clock = new THREE.Clock();
}
function animate(){
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  if(controls.isLocked){
    velocity.x -= velocity.x * 10.0 * delta;
    velocity.z -= velocity.z * 10.0 * delta;
    velocity.y -= 9.8 * 5.0 * delta; // gravity
    direction.z = Number(moveForward) - Number(moveBackward);
    direction.x = Number(moveRight) - Number(moveLeft);
    direction.normalize();
    if(moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
    if(moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;
    controls.moveRight(-velocity.x * delta);
    controls.moveForward(-velocity.z * delta);
    controls.getObject().position.y += velocity.y * delta; // vertical motion
    // Simple ground collision
    if(controls.getObject().position.y < 1.6){
      velocity.y = 0;
      controls.getObject().position.y = 1.6;
      canJump = true;
    }
  }
  renderer.render(scene, camera);
}
</script>
</body>
</html>
